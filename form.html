<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>حجز زيارة - طرابلس</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0; 
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body, html {
      height: 100%;
      background-color: #e6f7ff;
      color: #4a2e0f;
    }

    .lkbire {
      background-color: rgba(255,255,255,0.7);
      min-height: 100%;
      padding: 20px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #d0eaff;
      padding: 15px 25px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    nav h1 {
      color: #7a5322;
      font-size: 2rem;
    }

    nav ul {
      display: flex;
      list-style: none;
    }

    nav ul li {
      margin-left: 20px;
    }

    nav ul li a {
      color: #5a3e1b;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #000;
    }

    .juwa {
      max-width: 700px;
      margin: auto;
      background-color: #fff;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(100,100,100,0.2);
    }

    h2 {
      color: #7a5322;
      font-size: 2rem;
      margin-bottom: 20px;
      text-align: center;
    }

    form label {
      display: block;
      margin: 15px 0 5px;
      color: #3e2d1c;
    }

    form input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    form input.invalid {
      border-color: #d9534f;
      background-color: #f9d6d5;
    }

    .error-msg {
      color: #d9534f;
      font-size: 0.85rem;
      margin-top: 5px;
      display: none;
    }

    button {
      background-color: #cceeff;
      color: #5a3e1b;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }

    button:hover {
      background-color: #aadcee;
    }

    .message {
      margin-top: 20px;
      padding: 10px;
      background-color: #dfffe0;
      color: #2e5c2e;
      border: 1px solid #88c488;
      border-radius: 5px;
      display: none;
      text-align: center;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: #5a3e1b;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="lkbire">
    <nav>
      <h1>طرابلس</h1>
      <ul>
        <li><a href="main.html" target="_blank">الرئيسية</a></li>
        <li><a href="places.html" target="_blank">أماكن</a></li>
        <li><a href="history.html" target="_blank">تاريخ</a></li>
      </ul>
    </nav>

    <div class="juwa">
      <h2>احجز زيارتك لعروس الشمال</h2>
      <form id="visitForm" novalidate>
        <label for="name">الاسم الكامل</label>
        <input type="text" id="name" required />
        <div class="error-msg" id="name-error">الاسم لازم يكون حروف انجليزي ومسافات بس.</div>

        <label for="phone">رقم التليفون</label>
        <input type="tel" id="phone" required />
        <div class="error-msg" id="phone-error">رقم التليفون لازم يكون لبناني.</div>

        <label for="email">الإيميل</label>
        <input type="email" id="email" required />
        <div class="error-msg" id="email-error">رجاءً أدخل إيميل صح.</div>

        <label for="date">تاريخ الزيارة</label>
        <input type="date" id="date" required />

        <button type="submit">احجز</button>
      </form>

      <div class="message" id="confirmationMsg">
        شكراً إلك! تم تسجيل الحجز، ومنتمنالك زيارة موفّقة ❤️
      </div>
    </div>

    <footer>
      <p>&copy; ٢٠٢٥ مدينة طرابلس - لبنان</p>
    </footer>
  </div>

  <script>
    $(document).ready(function () {
      function validateName(name) {
        return /^[\a-zA-Z\s]+$/.test(name.trim());
      }

      function validatePhone(phone) {
        phone = phone.split(" ").join("");
        return /^(\+961|0)?(3\d{6}|7\d{7}|81\d{6})$/.test(phone);
      }

      function validateEmail(email) {
        return /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(email);
      }

      $("#visitForm").submit(function (e) {
        e.preventDefault();

        let name = $("#name").val();
        let phone = $("#phone").val();
        let email = $("#email").val();
        let date = $("#date").val();

        let valid = true;

        if (!validateName(name)) {
          valid = false;
          $("#name").addClass("invalid");
          $("#name-error").show();
        } else {
          $("#name").removeClass("invalid");
          $("#name-error").hide();
        }

        if (!validatePhone(phone)) {
          valid = false;
          $("#phone").addClass("invalid");
          $("#phone-error").show();
        } else {
          $("#phone").removeClass("invalid");
          $("#phone-error").hide();
        }

        if (!validateEmail(email)) {
          valid = false;
          $("#email").addClass("invalid");
          $("#email-error").show();
        } else {
          $("#email").removeClass("invalid");
          $("#email-error").hide();
        }

       
        if (!date) {
          valid = false;
          $("#date").addClass("invalid");
        } else {
          $("#date").removeClass("invalid");
        }

        if (valid) {
          $("#confirmationMsg").slideDown();
          $(this).trigger("reset");
          setTimeout(() => $("#confirmationMsg").slideUp(), 5000);
        } else {
          $("#confirmationMsg").hide();
        }
      });
    });
  </script>
</body>
</html>
